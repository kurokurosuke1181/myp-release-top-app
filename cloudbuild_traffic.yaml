# プレビュー確認後に最新リビジョンへトラフィックを切り替えるための定義です。

substitutions:
  _REGION: asia-northeast1
  _SERVICE: top-app

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'bash'
    args:
      - '-ceu'
      - |
        gcloud run services update-traffic "${_SERVICE}" \
          --region="${_REGION}" \
          --platform=managed \
          --to-latest
